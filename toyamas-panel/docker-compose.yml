version: '3.8'

services:
  toyamas-panel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toyamas-panel
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/app/data/toyamas.db
      - ADMIN_USER=admin
      - ADMIN_PASS=toyamas123
    volumes:
      # Docker Socket for Container Monitoring & Actions
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Host proc filesystem for System Metrics (CPU/RAM/Disk/Network)
      - /proc:/host/proc:ro
      # Persistent SQLite Database Storage
      - ./data:/app/data
    security_opt:
      - label:disable
