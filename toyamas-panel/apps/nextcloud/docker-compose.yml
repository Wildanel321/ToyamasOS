version: '3.8'

services:
  toyamas-nextcloud:
    image: nextcloud:fpm-alpine
    container_name: toyamas-nextcloud-app
    restart: always
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
    volumes:
      - ./html:/var/www/html

  toyamas-nextcloud-web:
    image: nginx:alpine
    container_name: toyamas-nextcloud-web
    restart: always
    ports:
      - "${HTTP_PORT}:80"
    volumes:
      - ./html:/var/www/html:ro
    depends_on:
      - toyamas-nextcloud
