# ToyamasOS ZRAM Configuration
# Compressed RAM swap for low-RAM (1GB) VPS instances

# Compression algorithm (zstd provides highest compression ratio, lz4 is fastest)
COMP_ALGORITHM=zstd

# Memory size allocated to ZRAM device (percentage of total RAM or size in MB)
# 50% of total system RAM is optimal for 1GB VPS
ZRAM_PERCENT=50

# Priority of ZRAM swap device (higher than disk swap so ZRAM is used first)
ZRAM_PRIORITY=100
