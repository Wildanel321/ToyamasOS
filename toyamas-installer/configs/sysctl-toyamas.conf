# ToyamasOS Kernel Sysctl Optimization Profile
# Optimized for: Debian 13 Minimal, 1 GB RAM, 2 vCPU VPS
# Target Workloads: Docker, Self-Hosting, Web Hosting

# Memory & Swap Management
# High swappiness prioritizes compressing inactive memory pages into ZRAM
vm.swappiness = 100

# Retain directory and dentry caches in RAM longer to accelerate file lookups
vm.vfs_cache_pressure = 50

# Flushes dirty RAM pages to disk earlier to prevent I/O stalls on cheap VPS SSD/NVMe
vm.dirty_background_ratio = 5
vm.dirty_ratio = 10

# Network Stack Optimizations for 1GB RAM / 2 vCPU
# Max socket listen backlog
net.core.somaxconn = 1024

# Max length of incoming connections queue
net.ipv4.tcp_max_syn_backlog = 2048

# Fast socket teardown to reuse memory quickly
net.ipv4.tcp_fin_timeout = 15

# Connection keepalive probe frequency (seconds)
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 15
net.ipv4.tcp_keepalive_probes = 5

# Allow reuse of TIME_WAIT sockets for new connections
net.ipv4.tcp_tw_reuse = 1

# Network Security Hardening
# Reverse path filtering (prevents IP spoofing)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Ignore ICMP echo broadcasts (prevents Smurf attacks)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Disable ICMP redirect acceptance
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Enable SYN flood protection
net.ipv4.tcp_syncookies = 1
